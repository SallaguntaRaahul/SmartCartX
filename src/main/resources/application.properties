spring.application.name=smartcart

info.app.name=SmartCartX
info.app.version=1.0.0
info.app.description=E-Commerce Backend API
info.app.java-version=17
info.app.author=Raahul Sallagunta
management.info.env.enabled=true
spring.datasource.url=jdbc:postgresql://localhost:5432/smartcartdb
spring.datasource.username=smartcart
spring.datasource.password=smartcart123
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
# JWT
jwt.secret=smartcartSecretKey2024VeryLongSecretKeyForHMACSHA256Algorithm
jwt.expiration=86400000
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true
# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis
spring.cache.redis.time-to-live=300000
spring.cache.redis.cache-null-values=false

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=smartcart-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.auto-offset-reset=earliest

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.packages-to-scan=com.smartcart.smartcart.controller

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.app.name=SmartCartX
management.info.app.version=1.0.0
management.info.app.description=E-Commerce Backend


server.port=8080