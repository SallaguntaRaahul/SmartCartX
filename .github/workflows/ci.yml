name: SmartCartX CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  test:
    name: Build and Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: smartcartdb
          POSTGRES_USER: smartcart
          POSTGRES_PASSWORD: smartcart123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests with coverage
        run: mvn clean verify jacoco:report
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/smartcartdb
          SPRING_DATASOURCE_USERNAME: smartcart
          SPRING_DATASOURCE_PASSWORD: smartcart123
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379
          SPRING_KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          JWT_SECRET: smartcartSecretKey2024VeryLongSecretKeyForHMACSHA256Algorithm
          JWT_EXPIRATION: 86400000

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: Print test summary
        if: always()
        run: |
          echo "==============================="
          echo "TEST RESULTS"
          echo "==============================="
          find target/surefire-reports -name "*.txt" \
            -exec tail -3 {} \;

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t smartcart-app:latest .
          docker images | grep smartcart

      - name: Test Docker image
        run: |
          echo "Docker image built successfully"
          docker inspect smartcart-app:latest \
            --format='Size: {{.Size}} bytes'
