apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartcart-app
  namespace: smartcart
  labels:
    app: smartcart-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: smartcart-app
  template:
    metadata:
      labels:
        app: smartcart-app
    spec:
      containers:
        - name: smartcart-app
          image: smartcart-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: smartcart-config
            - secretRef:
                name: smartcart-secret
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: smartcart-service
  namespace: smartcart
spec:
  selector:
    app: smartcart-app
  ports:
    - port: 80
      targetPort: 8080
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: smartcart-hpa
  namespace: smartcart
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: smartcart-app
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
