replicaCount: 2

image:
  repository: smartcartxraahul.azurecr.io/smartcart-app
  tag: latest
  pullPolicy: Always

service:
  type: LoadBalancer
  port: 80
  targetPort: 8080

resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "500m"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

database:
  url: jdbc:postgresql://postgres-service:5432/smartcartdb
  username: smartcart
  password: smartcart123

redis:
  host: redis-service
  port: 6379

kafka:
  bootstrapServers: kafka-service:9092

jwt:
  secret: smartcartSecretKey2024VeryLongSecretKeyForHMACSHA256Algorithm
  expiration: 86400000

probes:
  readiness:
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 5
  liveness:
    initialDelaySeconds: 60
    periodSeconds: 30
    failureThreshold: 3
